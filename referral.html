<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Referral - Presdor Hub</title>

<link rel="stylesheet" href="css/style.css">

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f7fb;
}

.header{
background:#2563EB;
color:white;
padding:20px;
text-align:center;
border-bottom-left-radius:20px;
border-bottom-right-radius:20px;
}

.container{
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
margin-bottom:20px;
}

.card h3{
margin-top:0;
color:#2563EB;
}

.stat{
font-size:30px;
font-weight:bold;
color:#16a34a;
}

input{
width:100%;
padding:12px;
border:1px solid #ddd;
border-radius:10px;
margin-top:10px;
box-sizing:border-box;
}

button{
width:100%;
padding:15px;
margin-top:10px;
border:none;
border-radius:10px;
background:#2563EB;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.share{
background:#16a34a;
}

.history{
margin-top:20px;
}

.history-item{
padding:10px;
border-bottom:1px solid #eee;
}

</style>

</head>

<body>

<div class="header">
<h1>Referral Center</h1>
<p>Invite friends and earn rewards</p>
</div>

<div class="container">

<div class="card">

<h3>Total Referrals</h3>

<div class="stat" id="totalReferrals">0</div>

</div>

<div class="card">

<h3>Referral Bonus</h3>

<div class="stat" id="referralBonus">₦0</div>

</div>

<div class="card">

<h3>Your Referral Link</h3>

<input
id="referralLink"
readonly>

<button onclick="copyReferral()">
Copy Referral Link
</button>

<button
class="share"
onclick="shareWhatsApp()">

Share on WhatsApp

</button>

</div>

<div class="card history">

<h3>Referral History</h3>

<div id="history">

No referrals yet.

</div>

</div>

</div>

<script type="module" src="js/referral.js"></script>

</body>
</html>
