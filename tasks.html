<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tasks - Presdor Hub</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f7fb;
}

.header{
background:#2563EB;
color:white;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
border-bottom-left-radius:20px;
border-bottom-right-radius:20px;
}

.container{
padding:15px;
}

.task{
background:white;
padding:15px;
margin-bottom:20px;
border-radius:15px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.task h2{
margin:0 0 10px;
}

.reward{
color:green;
font-size:20px;
font-weight:bold;
}

button{
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:10px;
background:#2563EB;
color:white;
font-size:17px;
font-weight:bold;
cursor:pointer;
}

</style>

</head>

<body>

<div class="header">
Available Tasks
</div>

<div class="container">

<div id="tasks">

Loading Tasks...

</div>

</div>

<script type="module" src="js/tasks.js"></script>

</body>
</html>
