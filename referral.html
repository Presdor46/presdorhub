<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Referral - Presdor Hub</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f7fb;
}

.header{
background:#2563EB;
color:white;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.container{
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:10px;
margin:10px 0;
}

button{
width:100%;
padding:14px;
background:#2563EB;
color:white;
border:none;
border-radius:10px;
font-size:17px;
font-weight:bold;
cursor:pointer;
}

.stat{
font-size:22px;
font-weight:bold;
color:#2563EB;
margin-top:10px;
}

</style>

</head>

<body>

<div class="header">
Referral Center
</div>

<div class="container">

<div class="card">

<h3>My Referral Link</h3>

<input
type="text"
id="refLink"
readonly>

<button onclick="copyLink()">
📋 Copy Referral Link
</button>

</div>

<div class="card">

<h3>Total Referrals</h3>

<div class="stat" id="totalReferrals">
0
</div>

</div>

<div class="card">

<h3>Referral Earnings</h3>

<div class="stat" id="referralEarnings">
₦0
</div>

</div>

</div>

<script type="module" src="js/referral.js"></script>

</body>
</html>
