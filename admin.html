<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard - Presdor Hub</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f7fb;
padding-bottom:30px;
}

.header{
background:#2563EB;
color:white;
padding:25px;
text-align:center;
font-size:28px;
font-weight:bold;
border-bottom-left-radius:20px;
border-bottom-right-radius:20px;
}

.stats{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
text-align:center;
box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.card h3{
margin-bottom:10px;
font-size:15px;
color:#666;
}

.card h2{
color:#2563EB;
font-size:25px;
}

.menu{
padding:20px;
}

.menu a{
display:block;
background:white;
margin-bottom:15px;
padding:18px;
border-radius:15px;
text-decoration:none;
color:#000;
font-weight:bold;
box-shadow:0 2px 8px rgba(0,0,0,.1);
}

</style>

</head>

<body>

<div class="header">

👑 Admin Dashboard

</div>

<div class="stats">

<div class="card">
<h3>Total Users</h3>
<h2 id="usersCount">0</h2>
</div>

<div class="card">
<h3>Pending Tasks</h3>
<h2 id="tasksCount">0</h2>
</div>

<div class="card">
<h3>Withdraw Requests</h3>
<h2 id="withdrawCount">0</h2>
</div>

<div class="card">
<h3>Transactions</h3>
<h2 id="transactionCount">0</h2>
</div>

</div>

<div class="menu">

<a href="admin-submissions.html">
📋 Manage Task Submissions
</a>

<a href="admin-withdraw.html">
💸 Withdraw Requests
</a>

<a href="tasks.html">
📝 Manage Tasks
</a>

<a href="history.html">
📊 Transactions
</a>

<a href="dashboard.html">
🏠 Back to Dashboard
</a>

</div>

<script type="module" src="js/admin.js"></script>

</body>

</html>
