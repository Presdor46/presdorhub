<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Deposit</title>

<link rel="stylesheet" href="css/style.css">

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f7fb;
}

.header{
background:#2563EB;
color:white;
padding:20px;
text-align:center;
font-size:30px;
font-weight:bold;
border-bottom-left-radius:20px;
border-bottom-right-radius:20px;
}

.container{
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

input{
width:100%;
padding:14px;
margin:12px 0;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
box-sizing:border-box;
}

button{
width:100%;
padding:14px;
background:#2563EB;
color:white;
border:none;
border-radius:8px;
font-size:17px;
font-weight:bold;
cursor:pointer;
}

.bottom-nav{
position:fixed;
left:0;
right:0;
bottom:0;
background:white;
display:flex;
justify-content:space-around;
padding:15px;
box-shadow:0 -2px 8px rgba(0,0,0,.1);
}

.bottom-nav a{
text-decoration:none;
font-weight:bold;
color:#2563EB;
}

</style>

</head>

<body>

<div class="header">
Deposit Funds
</div>

<div class="container">

<div class="card">

<input
type="number"
id="amount"
placeholder="Enter Deposit Amount">

<input
type="text"
id="sender"
placeholder="Sender Name">

<input
type="text"
id="reference"
placeholder="Payment Reference (Optional)">

<button id="depositBtn">
Submit Deposit
</button>

</div>

</div>

<div class="bottom-nav">

<a href="dashboard.html">🏠 Home</a>

<a href="tasks.html">📋 Tasks</a>

<a href="deposit.html">💰 Deposit</a>

<a href="profile.html">👤 Profile</a>

</div>

<script type="module" src="js/deposit.js"></script>

</body>

</html>
