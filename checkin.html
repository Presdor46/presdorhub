<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Daily Check-in</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f7fb;
}

.header{
background:#2563EB;
color:white;
padding:20px;
text-align:center;
font-size:30px;
font-weight:bold;
border-bottom-left-radius:20px;
border-bottom-right-radius:20px;
}

.container{
padding:20px;
}

.card{
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
text-align:center;
}

.card h2{
margin-bottom:10px;
}

.card p{
font-size:16px;
color:#555;
}

button{
width:100%;
padding:15px;
margin-top:20px;
background:#2563EB;
color:white;
border:none;
border-radius:10px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

</style>

</head>

<body>

<div class="header">

Daily Check-in

</div>

<div class="container">

<div class="card">

<h2>🎁 Daily Reward</h2>

<p>
Click the button below to claim your daily bonus.
</p>

<h1>₦100</h1>

<button id="checkinBtn">

Claim Reward

</button>

</div>

</div>

<script type="module" src="js/checkin.js"></script>

</body>

</html>
