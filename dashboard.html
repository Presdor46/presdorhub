<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard - Presdor Hub</title>

<link rel="stylesheet" href="css/navigation.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f7fb;
padding-bottom:90px;
}

#loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
display:flex;
justify-content:center;
align-items:center;
font-size:24px;
font-weight:bold;
z-index:9999;
}

.header{
background:#2563EB;
color:white;
padding:25px;
border-bottom-left-radius:25px;
border-bottom-right-radius:25px;
}

.header h2{
margin-bottom:8px;
}

.stats{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
padding:20px;
}

.card{
background:white;
padding:18px;
border-radius:15px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
text-align:center;
}

.card h3{
font-size:15px;
margin-bottom:10px;
color:#555;
}

.card h2{
font-size:24px;
color:#2563EB;
}

.section-title{
padding:0 20px;
margin-top:10px;
margin-bottom:10px;
font-size:22px;
font-weight:bold;
}

.action-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
padding:20px;
}

.action{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
text-align:center;
font-weight:bold;
cursor:pointer;
}

.action:hover{
background:#eef4ff;
}

</style>

</head>

<body>

<div id="loader">
Loading...
</div>

<div class="header">

<h2 id="welcome">
Welcome
</h2>

<p>Presdor Hub</p>

</div>

<div class="stats">

<div class="card">
<h3>💰 Balance</h3>
<h2 id="balance">₦0</h2>
</div>

<div class="card">
<h3>👥 Referrals</h3>
<h2 id="referrals">0</h2>
</div>

<div class="card">
<h3>📋 Tasks</h3>
<h2 id="tasks">0</h2>
</div>

<div class="card">
<h3>💸 Withdrawals</h3>
<h2 id="withdrawals">0</h2>
</div>

</div>

<h2 class="section-title">
Quick Actions
</h2>

<div class="action-grid">

<div class="action" onclick="location.href='tasks.html'">
📋<br><br>Tasks
</div>

<div class="action" onclick="location.href='affiliate.html'">
💼<br><br>Offers
</div>

<div class="action" onclick="location.href='withdraw.html'">
💰<br><br>Withdraw
</div>

<div class="action" onclick="location.href='profile.html'">
👤<br><br>Profile
</div>

</div>

<div class="bottom-nav">

<a href="dashboard.html" class="active">
🏠<br>Home
</a>

<a href="tasks.html">
📋<br>Tasks
</a>

<a href="affiliate.html">
💼<br>Offers
</a>

<a href="withdraw.html">
💰<br>Withdraw
</a>

<a href="profile.html">
👤<br>Profile
</a>

</div>

<script type="module" src="js/dashboard.js"></script>

</body>
</html>
