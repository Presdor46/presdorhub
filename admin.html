<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard - Presdor Hub</title>

<link rel="stylesheet" href="css/style.css">

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f7fb;
}

.header{
background:#2563EB;
color:white;
padding:20px;
text-align:center;
font-size:26px;
font-weight:bold;
border-bottom-left-radius:20px;
border-bottom-right-radius:20px;
}

.container{
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
text-align:center;
box-shadow:0 2px 10px rgba(0,0,0,.1);
cursor:pointer;
transition:.3s;
}

.card:hover{
transform:scale(1.03);
}

.card h3{
margin:10px 0;
color:#2563EB;
}

.card p{
margin:0;
font-size:14px;
color:#555;
}

</style>

</head>

<body>

<div class="header">

👑 ADMIN PANEL

</div>

<div class="container">

<div class="grid">

<div class="card" onclick="location.href='users.html'">
<h3>👥 Users</h3>
<p>Manage Users</p>
</div>

<div class="card" onclick="location.href='deposits.html'">
<h3>💰 Deposits</h3>
<p>Approve Deposits</p>
</div>

<div class="card" onclick="location.href='withdrawals.html'">
<h3>💸 Withdrawals</h3>
<p>Approve Withdrawals</p>
</div>

<div class="card" onclick="location.href='tasks.html'">
<h3>📋 Tasks</h3>
<p>Manage Tasks</p>
</div>

<div class="card" onclick="location.href='affiliate.html'">
<h3>💼 Affiliate</h3>
<p>Manage Offers</p>
</div>

<div class="card" onclick="location.href='notifications.html'">
<h3>📢 Notifications</h3>
<p>Send Notice</p>
</div>

<div class="card" onclick="location.href='reports.html'">
<h3>📊 Reports</h3>
<p>Statistics</p>
</div>

<div class="card" onclick="location.href='settings.html'">
<h3>⚙️ Settings</h3>
<p>App Settings</p>
</div>

</div>

</div>

<script type="module" src="js/admin.js"></script>

</body>
</html>
