<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Withdraw - Presdor Hub</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f7fb;
}

.header{
background:#2563EB;
color:#fff;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
border-bottom-left-radius:20px;
border-bottom-right-radius:20px;
}

.container{
padding:20px;
}

.card{
background:#fff;
padding:20px;
border-radius:15px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.balance{
font-size:30px;
font-weight:bold;
color:#16a34a;
text-align:center;
margin-bottom:20px;
}

input,select{
width:100%;
padding:14px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:10px;
box-sizing:border-box;
font-size:16px;
}

button{
width:100%;
padding:15px;
background:#2563EB;
color:white;
border:none;
border-radius:10px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

</style>

</head>

<body>

<div class="header">

Withdraw

</div>

<div class="container">

<div class="card">

<div class="balance" id="balance">

₦0

</div>

<input
type="number"
id="amount"
placeholder="Enter Amount">

<input
type="text"
id="accountName"
placeholder="Account Name">

<input
type="text"
id="accountNumber"
placeholder="Account Number">

<input
type="text"
id="bankName"
placeholder="Bank Name">

<button id="withdrawBtn">

Submit Withdrawal

</button>

</div>

</div>

<script type="module" src="js/withdraw.js"></script>

</body>
</html>
