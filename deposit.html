<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Deposit</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f7fb;
}

.header{
background:#2563EB;
color:white;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.container{
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.bank{
background:#eef4ff;
padding:15px;
border-radius:10px;
margin-bottom:20px;
}

input{
width:100%;
padding:14px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:10px;
box-sizing:border-box;
font-size:16px;
}

button{
width:100%;
padding:15px;
background:#2563EB;
color:white;
border:none;
border-radius:10px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

</style>

</head>

<body>

<div class="header">

Deposit

</div>

<div class="container">

<div class="card">

<div class="bank">

<h3>Bank Details</h3>

<p><b>Bank:</b> OPay</p>

<p><b>Account Name:</b> ABBA MUHAMMAD</p>

<p><b>Account Number:</b> 8160727694</p>

</div>

<input
type="number"
id="amount"
placeholder="Amount Paid">

<input
type="text"
id="senderName"
placeholder="Sender Name">

<input
type="text"
id="reference"
placeholder="Reference (Optional)">

<button id="depositBtn">

I've Paid

</button>

</div>

</div>

<script type="module" src="js/deposit.js"></script>

</body>
</html>
