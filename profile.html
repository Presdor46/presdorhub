<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Profile</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f7fb;
}

.header{
background:#2563EB;
color:white;
padding:25px;
text-align:center;
font-size:28px;
font-weight:bold;
border-bottom-left-radius:25px;
border-bottom-right-radius:25px;
}

.container{
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.info{
margin-bottom:20px;
}

.info h3{
margin:0;
color:#2563EB;
font-size:18px;
}

.info p{
margin-top:5px;
font-size:17px;
font-weight:bold;
}

input{
width:100%;
padding:12px;
border:1px solid #ddd;
border-radius:10px;
font-size:15px;
box-sizing:border-box;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:10px;
font-size:17px;
font-weight:bold;
cursor:pointer;
margin-top:15px;
}

.copy{
background:#2563EB;
color:white;
}

.logout{
background:#dc2626;
color:white;
}

</style>

</head>

<body>

<div class="header">
My Profile
</div>

<div class="container">

<div class="card">

<div class="info">
<h3>Full Name</h3>
<p id="fullName">Loading...</p>
</div>

<div class="info">
<h3>Email</h3>
<p id="email">Loading...</p>
</div>

<div class="info">
<h3>Phone</h3>
<p id="phone">-</p>
</div>

<div class="info">
<h3>Balance</h3>
<p id="balance">₦0</p>
</div>

<div class="info">
<h3>Referral Link</h3>

<input
type="text"
id="referralLink"
readonly>

</div>

<button
class="copy"
onclick="copyReferral()">

Copy Referral Link

</button>

<button
id="logoutBtn"
class="logout">

Logout

</button>

</div>

</div>

<script type="module" src="js/profile.js"></script>
<link rel="stylesheet" href="css/navigation.css">

<div class="bottom-nav">

<a href="dashboard.html">🏠<br>Home</a>

<a href="tasks.html">📋<br>Tasks</a>

<a href="withdraw.html">💰<br>Withdraw</a>

<a href="profile.html">👤<br>Profile</a>

</div>
</body>
</html>
